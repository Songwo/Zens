# Campus Pulse media service - production nginx (B 服务器)
# 域名：media.allinsong.top（Cloudflare 灰色云 / DNS only；TLS 由本机 Let's Encrypt 承担）
#
# 部署：
#   1) cp media-allinsong.conf /etc/nginx/conf.d/
#   2) certbot --nginx -d media.allinsong.top --redirect
#   3) nginx -t && systemctl reload nginx
#
# 关键项：
#   - proxy_request_buffering off  边收边转给 Go，避免整包落 nginx 临时盘
#   - proxy_buffering off          上游响应直接流给客户端
#   - client_max_body_size 1024m   必须 ≥ go config.yaml 的 max_request_body_mb
#   - keepalive 128                复用到 Go 的连接池，少走 3 次握手

upstream campus_pulse_media {
    server 127.0.0.1:8090;
    keepalive 128;
    keepalive_requests 10000;
    keepalive_timeout 120s;
}

server {
    listen 80;
    listen [::]:80;
    server_name media.allinsong.top;

    # 保留给 Let's Encrypt HTTP-01 续签
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name media.allinsong.top;

    ssl_certificate     /etc/letsencrypt/live/media.allinsong.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.allinsong.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;

    # —— 大文件上传关键参数 ——
    client_max_body_size    1024m;
    client_body_timeout     600s;
    client_header_timeout   60s;
    client_body_buffer_size 1m;     # 超过就转磁盘，别开太大
    proxy_request_buffering off;    # ★ 边读边转给 Go
    proxy_buffering         off;    # ★ 响应也流式
    proxy_http_version      1.1;
    proxy_set_header Connection         "";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_connect_timeout   5s;
    proxy_send_timeout      600s;
    proxy_read_timeout      600s;

    # 上传 / 健康 / 面板登录 / admin / metrics 全部走这里
    location / {
        proxy_pass http://campus_pulse_media;
    }

    # 文件下载走长期浏览器缓存，文件 ID 不可变所以 immutable 安全
    location ~ ^/api/file/[0-9a-zA-Z_-]+$ {
        proxy_pass http://campus_pulse_media;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    # 不要把 pprof / metrics 暴露到公网：按需取消注释把它们拉白名单
    # location ~ ^/(debug/pprof|metrics) {
    #     allow <A 服务器公网 IP>;
    #     allow 127.0.0.1;
    #     deny all;
    #     proxy_pass http://campus_pulse_media;
    # }
}
