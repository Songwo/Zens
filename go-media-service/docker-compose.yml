services:
  go-media-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: campus-pulse/go-media-service:latest
    container_name: campus-pulse-go-media
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      MEDIA_SERVER_PORT: "8090"
      MEDIA_PUBLIC_BASE_URL: "http://localhost:8090"
      MEDIA_DATABASE_DSN: "./data/media.db"
      MEDIA_ADMIN_USERNAME: "${MEDIA_ADMIN_USERNAME:-admin}"
      MEDIA_ADMIN_PASSWORD: "${MEDIA_ADMIN_PASSWORD:?MEDIA_ADMIN_PASSWORD is required}"
      MEDIA_ADMIN_JWT_SECRET: "${MEDIA_ADMIN_JWT_SECRET:?MEDIA_ADMIN_JWT_SECRET is required}"
      MEDIA_ADMIN_SERVICE_TOKENS: "${MEDIA_ADMIN_SERVICE_TOKENS:?MEDIA_ADMIN_SERVICE_TOKENS is required}"
      MEDIA_UPLOAD_JWT_SECRET: "${MEDIA_UPLOAD_JWT_SECRET:?MEDIA_UPLOAD_JWT_SECRET is required}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./tmp:/app/tmp
      - ./logs:/app/logs
