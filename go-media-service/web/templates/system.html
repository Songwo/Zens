<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .title }}</title>
  <link rel="stylesheet" href="{{ .basePath }}/static/css/panel.css">
</head>
<body>
  <div class="panel-shell">
    <aside class="sidebar">
      <h2>Media Service</h2>
      <nav>
        <a href="{{ .basePath }}">仪表盘</a>
        <a href="{{ .basePath }}/uploads">上传记录</a>
        <a href="{{ .basePath }}/files">文件管理</a>
        <a class="active" href="{{ .basePath }}/system">系统监控</a>
        <a href="{{ .basePath }}/config">运行配置</a>
      </nav>
      <form method="post" action="{{ .basePath }}/logout">
        <button type="submit" class="ghost-btn">退出登录</button>
      </form>
    </aside>
    <main class="panel-main">
      <header class="panel-header">
        <h1>系统监控</h1>
        <p>进程状态、内存、CPU、磁盘、连接数、响应指标</p>
      </header>
      <section class="panel-card" id="system-panel"></section>
    </main>
  </div>
  <script>window.MEDIA_PANEL_PAGE = "system"; window.MEDIA_PANEL_BASE = "{{ .basePath }}";</script>
  <script src="{{ .basePath }}/static/js/panel.js"></script>
</body>
</html>
