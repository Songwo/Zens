<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .title }}</title>
  <link rel="stylesheet" href="{{ .basePath }}/static/css/panel.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Go 媒体上传服务</h1>
    <p>后台登录</p>
    {{ if .error }}<div class="alert alert-error">{{ .error }}</div>{{ end }}
    <form method="post" action="{{ .basePath }}/login" class="login-form">
      <label>账号</label>
      <input type="text" name="username" placeholder="请输入管理账号" required>
      <label>密码</label>
      <input type="password" name="password" placeholder="请输入管理密码" required>
      <button type="submit">登 录</button>
    </form>
  </div>
</body>
</html>
