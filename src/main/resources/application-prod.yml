server:
  port: ${SERVER_PORT:7800}
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - image/svg+xml
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT_MS:120000}
    keep-alive-timeout: ${SERVER_KEEP_ALIVE_TIMEOUT_MS:120000}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    max-swallow-size: ${SERVER_TOMCAT_MAX_SWALLOW_SIZE:-1}

spring:
  config:
    import:
      - optional:file:./.env.prod[.properties]
      - optional:file:./.env.production[.properties]
  banner:
    location: classpath:banner.txt
  output:
    ansi:
      enabled: NEVER

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: ${DB_HIKARI_MIN_IDLE:8}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:32}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:1200000}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:20000}
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT:5000}
      keepalive-time: ${DB_HIKARI_KEEPALIVE_TIME:60000}
      leak-detection-threshold: ${DB_HIKARI_LEAK_DETECTION_THRESHOLD:120000}
      connection-test-query: SELECT 1
      pool-name: CampusPulseHikariCP
      register-mbeans: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:3000ms}
      lettuce:
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:true}
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: campus-pulse
    enable:
      hikaricp: true

logging:
  file:
    name: ${LOG_FILE:./log/logfile.log}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROLLING_PATTERN:./log/archive/campus-pulse.%d{yyyy-MM-dd}.%i.log.gz}
      max-file-size: ${LOG_MAX_FILE_SIZE:20MB}
      max-history: ${LOG_MAX_HISTORY:15}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
      clean-history-on-start: ${LOG_CLEAN_HISTORY_ON_START:true}
  level:
    root: INFO
    com.campus.trend.campus_pulse: INFO
    com.baomidou: WARN
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET}
  access-expire: ${JWT_ACCESS_EXPIRE:7200000}
  refresh-expire: ${JWT_REFRESH_EXPIRE:1209600000}
  remember-access-multiplier: ${JWT_REMEMBER_ACCESS_MULTIPLIER:7}
  remember-refresh-multiplier: ${JWT_REMEMBER_REFRESH_MULTIPLIER:4}
  sliding-renew-threshold: ${JWT_SLIDING_RENEW_THRESHOLD:900000}

Web:
  AvatarUrl: ${AVATAR_BASE_URL}

ai:
  deepseek:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

recommendation:
  weights:
    tag-score-weight: ${REC_TAG_SCORE_WEIGHT:1.0}
    time-factor-weight: ${REC_TIME_FACTOR_WEIGHT:1.0}
    engagement-factor-weight: ${REC_ENGAGEMENT_FACTOR_WEIGHT:1.0}
    time-decay-days: ${REC_TIME_DECAY_DAYS:7.0}
    time-decay-exponent: ${REC_TIME_DECAY_EXPONENT:1.2}
    like-weight: ${REC_LIKE_WEIGHT:1.0}
    comment-weight: ${REC_COMMENT_WEIGHT:2.0}
    collect-weight: ${REC_COLLECT_WEIGHT:1.5}
    engagement-divisor: ${REC_ENGAGEMENT_DIVISOR:100.0}
    max-engagement-boost: ${REC_MAX_ENGAGEMENT_BOOST:1.0}
    candidate-limit: ${REC_CANDIDATE_LIMIT:200}
    anonymous-hot-limit: ${REC_ANONYMOUS_HOT_LIMIT:50}
    interest-limit: ${REC_INTEREST_LIMIT:20}
    cf-limit: ${REC_CF_LIMIT:10}
    hot-limit: ${REC_HOT_LIMIT:20}

trend:
  schedule:
    view-log-retention-days: ${VIEW_LOG_RETENTION_DAYS:90}

campus:
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:8}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:16}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:200}
    keep-alive-seconds: ${ASYNC_KEEP_ALIVE_SECONDS:60}
    await-termination-seconds: ${ASYNC_AWAIT_TERMINATION_SECONDS:60}
    thread-name-prefix: ${ASYNC_THREAD_NAME_PREFIX:campus-async-}
  cache:
    null-value-ttl-seconds: ${CACHE_NULL_VALUE_TTL_SECONDS:30}
    version-key-ttl-hours: ${CACHE_VERSION_KEY_TTL_HOURS:168}
    ttl-jitter-ratio: ${CACHE_TTL_JITTER_RATIO:0.2}
  upload:
    url-prefix: ${UPLOAD_URL_PREFIX:/uploads/}
    avatar-module: ${UPLOAD_AVATAR_MODULE:avatar}
    max-image-size-mb: ${MAX_IMAGE_SIZE_MB:15}
    max-image-width: ${MAX_IMAGE_WIDTH:1920}
    max-image-height: ${MAX_IMAGE_HEIGHT:1080}
    jpeg-quality: ${IMAGE_JPEG_QUALITY:0.85}
    allowed-image-extensions: ${ALLOWED_IMAGE_EXTENSIONS:.jpg,.jpeg,.png,.gif,.webp}
    max-video-size-mb: ${MAX_VIDEO_SIZE_MB:512}
    allowed-video-extensions: ${ALLOWED_VIDEO_EXTENSIONS:.mp4,.webm,.ogg,.mov}
    video-transcode-enabled: ${VIDEO_TRANSCODE_ENABLED:true}
    ffmpeg-bin: ${FFMPEG_BIN:ffmpeg}
    video-transcode-crf: ${VIDEO_TRANSCODE_CRF:28}
    enable-malware-placeholder-scan: ${UPLOAD_ENABLE_MALWARE_SCAN:true}
    imagebed-url: ${IMAGEBED_URL:}
    imagebed-api-key: ${IMAGEBED_API_KEY:}
    imagebed-threshold-mb: ${IMAGEBED_THRESHOLD_MB:3}
  notification:
    dedupe-window-seconds: ${NOTIFICATION_DEDUPE_WINDOW_SECONDS:120}
  security:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS}
    request-signature-required: ${REQUEST_SIGNATURE_REQUIRED:true}
  support:
    admin-username: ${SUPPORT_ADMIN_USERNAME:admin}
    admin-display-name: ${SUPPORT_ADMIN_DISPLAY_NAME:社区管理员}
  r2:
    enabled: ${R2_ENABLED:true}
    endpoint: ${R2_ENDPOINT}
    region: ${R2_REGION:auto}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET:campus-pulse-media}
    public-base-url: ${R2_PUBLIC_BASE_URL:https://media.allinsong.top}
    presign-ttl-seconds: ${R2_PRESIGN_TTL:3600}
    single-put-threshold-mb: ${R2_SINGLE_PUT_THRESHOLD_MB:10}
    part-size-mb: ${R2_PART_SIZE_MB:8}
    max-image-size-mb: ${R2_MAX_IMAGE_MB:15}
    max-video-size-mb: ${R2_MAX_VIDEO_MB:1024}
    allowed-image-extensions: ${R2_ALLOWED_IMAGE_EXTENSIONS:.jpg,.jpeg,.png,.gif,.webp}
    allowed-video-extensions: ${R2_ALLOWED_VIDEO_EXTENSIONS:.mp4,.webm,.ogg,.mov}
    cache-control: ${R2_CACHE_CONTROL:}
  observability:
    request-log-enabled: ${REQUEST_LOG_ENABLED:true}
    slow-request-ms: ${SLOW_REQUEST_MS:1000}
    slow-sql-ms: ${SLOW_SQL_MS:300}
    request-log-exclude-prefixes: ${REQUEST_LOG_EXCLUDE_PREFIXES:/actuator,/static,/uploads}
  log-management:
    enabled: ${LOG_MANAGEMENT_ENABLED:true}
    base-dir: ${LOG_BASE_DIR:./log}
    backup-dir: ${LOG_BACKUP_DIR:./log/backups}
    list-limit: ${LOG_LIST_LIMIT:200}
    preview-max-lines: ${LOG_PREVIEW_MAX_LINES:400}
    preview-max-bytes: ${LOG_PREVIEW_MAX_BYTES:131072}
    default-preview-lines: ${LOG_DEFAULT_PREVIEW_LINES:200}
    backup-retention-days: ${LOG_BACKUP_RETENTION_DAYS:15}
    max-backup-files: ${LOG_MAX_BACKUP_FILES:30}
    max-backup-total-size-mb: ${LOG_MAX_BACKUP_TOTAL_SIZE_MB:1024}
    auto-backup-enabled: ${LOG_AUTO_BACKUP_ENABLED:false}
    auto-backup-cron: ${LOG_AUTO_BACKUP_CRON:0 0 */6 * * ?}
    cleanup-cron: ${LOG_CLEANUP_CRON:0 20 4 * * ?}
    allowed-extensions: ${LOG_ALLOWED_EXTENSIONS:.log,.txt,.out,.err,.gz}

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}

cloudflare:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:true}
    allow-local-preview-skip: ${TURNSTILE_ALLOW_LOCAL_PREVIEW_SKIP:false}
    site-key: ${TURNSTILE_SITE_KEY:0x4AAAAAAC9xtOXBNKG-KQE9}
    secret-key: ${TURNSTILE_SECRET_KEY:0x4AAAAAAC9xtFFfXflEn-SwY6a7WDL4w3c}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
    connect-timeout-seconds: ${TURNSTILE_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${TURNSTILE_READ_TIMEOUT_SECONDS:8}
    proxy-host: ${TURNSTILE_PROXY_HOST:}
    proxy-port: ${TURNSTILE_PROXY_PORT:}

security:
  two-factor:
    issuer: ${TWO_FACTOR_ISSUER:Zens社区}
    login-ticket-expire-seconds: ${TWO_FACTOR_LOGIN_TICKET_EXPIRE_SECONDS:300}
    setup-expire-seconds: ${TWO_FACTOR_SETUP_EXPIRE_SECONDS:600}

auth:
  session:
    single-device: ${AUTH_SESSION_SINGLE_DEVICE:false}
    anomaly-notify-cooldown-seconds: ${AUTH_SESSION_ANOMALY_NOTIFY_COOLDOWN_SECONDS:3600}
