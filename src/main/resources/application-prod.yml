server:
  port: ${SERVER_PORT:7800}
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - image/svg+xml
  forward-headers-strategy: framework

spring:
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./.env.prod[.properties]
      - optional:file:./.env.production[.properties]
  banner:
    location: classpath:banner.txt
  output:
    ansi:
      enabled: NEVER

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  file:
    name: ${LOG_FILE:./log/logfile.log}
  level:
    root: INFO
    com.campus.trend.campus_pulse: INFO
    com.baomidou: WARN
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET}
  access-expire: ${JWT_ACCESS_EXPIRE:3600000}
  refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
  remember-access-multiplier: ${JWT_REMEMBER_ACCESS_MULTIPLIER:7}
  remember-refresh-multiplier: ${JWT_REMEMBER_REFRESH_MULTIPLIER:4}

Web:
  AvatarUrl: ${AVATAR_BASE_URL}

ai:
  deepseek:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

recommendation:
  weights:
    tag-score-weight: ${REC_TAG_SCORE_WEIGHT:1.0}
    time-factor-weight: ${REC_TIME_FACTOR_WEIGHT:1.0}
    engagement-factor-weight: ${REC_ENGAGEMENT_FACTOR_WEIGHT:1.0}
    time-decay-days: ${REC_TIME_DECAY_DAYS:7.0}
    time-decay-exponent: ${REC_TIME_DECAY_EXPONENT:1.2}
    like-weight: ${REC_LIKE_WEIGHT:1.0}
    comment-weight: ${REC_COMMENT_WEIGHT:2.0}
    collect-weight: ${REC_COLLECT_WEIGHT:1.5}
    engagement-divisor: ${REC_ENGAGEMENT_DIVISOR:100.0}
    max-engagement-boost: ${REC_MAX_ENGAGEMENT_BOOST:1.0}
    candidate-limit: ${REC_CANDIDATE_LIMIT:200}
    anonymous-hot-limit: ${REC_ANONYMOUS_HOT_LIMIT:50}
    interest-limit: ${REC_INTEREST_LIMIT:20}
    cf-limit: ${REC_CF_LIMIT:10}
    hot-limit: ${REC_HOT_LIMIT:20}

trend:
  schedule:
    view-log-retention-days: ${VIEW_LOG_RETENTION_DAYS:90}

campus:
  upload:
    url-prefix: ${UPLOAD_URL_PREFIX:/uploads/}
    max-image-size-mb: ${MAX_IMAGE_SIZE_MB:5}
    allowed-image-extensions: ${ALLOWED_IMAGE_EXTENSIONS:.jpg,.jpeg,.png,.gif,.webp}
  security:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS}
    request-signature-required: ${REQUEST_SIGNATURE_REQUIRED:true}
  support:
    admin-username: ${SUPPORT_ADMIN_USERNAME:admin}
    admin-display-name: ${SUPPORT_ADMIN_DISPLAY_NAME:社区管理员}

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}

security:
  two-factor:
    issuer: ${TWO_FACTOR_ISSUER:Zens社区}
    login-ticket-expire-seconds: ${TWO_FACTOR_LOGIN_TICKET_EXPIRE_SECONDS:300}
    setup-expire-seconds: ${TWO_FACTOR_SETUP_EXPIRE_SECONDS:600}
