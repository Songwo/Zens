server:
  port: 7800
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - image/svg+xml
spring:
  # 设置自定义 Banner 文件位置
  banner:
    location: classpath:banner.txt
  output:
    ansi:
      enabled: ALWAYS

  # 2. 数据库配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_pulse?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  # 2.1 Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms

  # 2.2 邮件服务配置
  # 使用 QQ 邮箱示例，其他邮箱请修改 host 和 port
  # 163邮箱: smtp.163.com:465 或 smtp.163.com:25
  # Gmail: smtp.gmail.com:587
  mail:
    host: ${MAIL_HOST:smtp.163.com}         # SMTP 服务器地址
    port: ${MAIL_PORT:465}                  # 端口 (587=TLS, 465=SSL)
    username: ${MAIL_USERNAME:zhaoqsnyah@163.com}   # 发件人邮箱
    password: ${MAIL_PASSWORD:TMSwqvRFGeSvSNGD}      # 授权码
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true      # 如果使用465端口，改为true
          timeout: 5000

# 3.MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: true
  global-config:
    # 全局配置
    db-config:
      # 数据库配置
      id-type: auto

# 4.Logging 配置
logging:
  # 1. 日志文件配置
  # 定义日志文件的完整路径和名称。
  # 文件将输出到项目根目录下的 /log/ 文件夹中。
  file:
    name: ./log/logfile.log
  # 2. 日志级别和输出格式
  # 设置日志输出格式
  pattern:
    # 控制台日志格式：时间 | 线程 | 级别 | Logger名称 | 消息
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){green} %clr(%logger){cyan} %clr(-){faint} %msg%n"
    # 文件日志格式：与控制台保持一致
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

  # 设置日志级别 (从低到高：TRACE, DEBUG, INFO, WARN, ERROR)
  level:
    # 根级别日志：对所有未单独配置的包生效
    root: INFO

    # 业务代码日志：将业务包设置为 DEBUG，以便看到 @Slf4j 打印的 DEBUG 级别信息
    com.campus.trend.campus_pulse: DEBUG

    # 第三方库日志：减少第三方库（如 Hibernate, Mybatis-Plus, Spring Security）的日志输出，避免刷屏
    com.baomidou: WARN
    org.springframework.security: WARN

# 5.JWT 配置
jwt:
  secret: ${JWT_SECRET:RwE7qC8ce3rE5eVTPVm1ZJNmD5JyAuDN1Xupe16p6gueoN9Ye5BYMReMm8ZMcv0u}
  access-expire: 3600000        # 1 小时
  refresh-expire: 604800000     # 7 天
  remember-access-multiplier: 7
  remember-refresh-multiplier: 4

# 6.Web Url 配置
Web:
  AvatarUrl: "http://localhost:7800/static/avatar/"

# 7. AI 深度思考模型配置
ai:
  deepseek:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:sk-0023d54a9f204920bd02602ca879e94b}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

# 8. 推荐权重参数（可配置化）
recommendation:
  weights:
    tag-score-weight: 1.0
    time-factor-weight: 1.0
    engagement-factor-weight: 1.0
    time-decay-days: 7.0
    time-decay-exponent: 1.2
    like-weight: 1.0
    comment-weight: 2.0
    collect-weight: 1.5
    engagement-divisor: 100.0
    max-engagement-boost: 1.0
    candidate-limit: 200
    anonymous-hot-limit: 50
    interest-limit: 20
    cf-limit: 10
    hot-limit: 20

# 9. 定时任务配置
trend:
  schedule:
    view-log-retention-days: 90

# 10. 上传安全控制配置
campus:
  upload:
    url-prefix: "/uploads/"
    max-image-size-mb: 5
    allowed-image-extensions: ".jpg,.jpeg,.png,.gif,.webp"
  security:
    # 生产环境请替换为你的前端域名，例如: https://app.example.com
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
    # 开发期可关闭强制签名，生产建议开启 true
    request-signature-required: ${REQUEST_SIGNATURE_REQUIRED:false}
  support:
    admin-username: ${SUPPORT_ADMIN_USERNAME:admin}
    admin-display-name: ${SUPPORT_ADMIN_DISPLAY_NAME:社区管理员}

# 11. 第三方登录与二步验证配置
oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:4173/auth?type=login&provider=github}

security:
  two-factor:
    issuer: ${TWO_FACTOR_ISSUER:Zens社区}
    login-ticket-expire-seconds: ${TWO_FACTOR_LOGIN_TICKET_EXPIRE_SECONDS:300}
    setup-expire-seconds: ${TWO_FACTOR_SETUP_EXPIRE_SECONDS:600}
