server:
  port: 7800
  forward-headers-strategy: framework
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript



      - application/javascript
      - image/svg+xml
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: 120000
    keep-alive-timeout: 120000
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    max-swallow-size: -1
spring:
  config:


    import:
      - optional:file:./.env.local[.properties]
      - optional:file:./.env.dev[.properties]
      - optional:file:./.env.development[.properties]
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  # 设置自定义 Banner 文件位置
  banner:
    location: classpath:banner.txt
  output:
    ansi:
      enabled: ALWAYS

  # 2. 数据库配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_pulse?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      minimum-idle: ${DB_MIN_IDLE:8}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:32}
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      validation-timeout: 5000
      keepalive-time: 60000
      leak-detection-threshold: 120000
      connection-test-query: SELECT 1
      pool-name: CampusPulseHikariCP
      register-mbeans: true

  # 2.1 Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        shutdown-timeout: 100ms
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: 3000ms

  # 2.2 RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 2
        max-concurrency: 10
        prefetch: 10

  # 2.3 邮件服务配置
  # 使用 QQ 邮箱示例，其他邮箱请修改 host 和 port
  # 163邮箱: smtp.163.com:465 或 smtp.163.com:25
  # Gmail: smtp.gmail.com:587
  mail:
    host: ${MAIL_HOST:smtp.163.com}         # SMTP 服务器地址
    port: ${MAIL_PORT:465}                  # 端口 (587=TLS, 465=SSL)
    username: ${MAIL_USERNAME:}   # 发件人邮箱（生产环境必须通过环境变量注入）
    password: ${MAIL_PASSWORD:}      # 授权码（生产环境必须通过环境变量注入）
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true      # 如果使用465端口，改为true
          timeout: 5000
# 3.MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-statement-timeout: 30
    default-fetch-size: 100
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:true}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: campus-pulse
    enable:
      hikaricp: true

# 4.Logging 配置
logging:
  # 1. 日志文件配置
  # 定义日志文件的完整路径和名称。
  # 文件将输出到项目根目录下的 /log/ 文件夹中。
  file:
    name: ./log/logfile.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROLLING_PATTERN:./log/archive/campus-pulse.%d{yyyy-MM-dd}.%i.log.gz}
      max-file-size: ${LOG_MAX_FILE_SIZE:20MB}
      max-history: ${LOG_MAX_HISTORY:15}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
      clean-history-on-start: ${LOG_CLEAN_HISTORY_ON_START:true}
  # 2. 日志级别和输出格式
  # 设置日志输出格式
  pattern:
    # 控制台日志格式：时间 | 线程 | 级别 | Logger名称 | 消息
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){green} %clr(%logger){cyan} %clr(-){faint} %msg%n"
    # 文件日志格式：与控制台保持一致
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

  # 设置日志级别 (从低到高：TRACE, DEBUG, INFO, WARN, ERROR)
  level:
    # 根级别日志：对所有未单独配置的包生效
    root: INFO

    # 业务代码日志：将业务包设置为 DEBUG，以便看到 @Slf4j 打印的 DEBUG 级别信息
    com.campus.trend.campus_pulse: ${APP_LOG_LEVEL:INFO}

    # 第三方库日志：减少第三方库（如 Hibernate, Mybatis-Plus, Spring Security）的日志输出，避免刷屏
    com.baomidou: WARN
    org.springframework.security: WARN

# 5.JWT 配置
jwt:
  # ⚠️ 此默认值仅为本地开发占位，严禁用于生产。生产环境必须通过环境变量 JWT_SECRET 注入至少 32 字节的随机串。
  secret: ${JWT_SECRET:dev-only-placeholder-secret-override-with-JWT_SECRET-env-in-production}
  access-expire: ${JWT_ACCESS_EXPIRE:7200000}        # 默认 2 小时
  refresh-expire: ${JWT_REFRESH_EXPIRE:1209600000}   # 默认 14 天
  remember-access-multiplier: 7
  remember-refresh-multiplier: 4
  sliding-renew-threshold: 900000

# 5.1 内部 s2s API 配置 (供 zdc-shop 等 Zens 子站调用)
internal:
  service:
    # 与 zdc-shop 共享的 HMAC 密钥;子站 .env 中 SHOP_SERVICE_SECRET 必须一致
    shop-secret: ${SHOP_SERVICE_SECRET:dev-shop-service-secret-CHANGE_ME_at_least_16_chars}

# 6.Web Url 配置
Web:
  AvatarUrl: "https://allinsong.top/static/avatar/"

# 7. AI 深度思考模型配置
ai:
  deepseek:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

# 8. 推荐权重参数（可配置化）
recommendation:
  weights:
    tag-score-weight: 1.0
    time-factor-weight: 1.0
    engagement-factor-weight: 1.0
    time-decay-days: 7.0
    time-decay-exponent: 1.2
    like-weight: 1.0
    comment-weight: 2.0
    collect-weight: 1.5
    engagement-divisor: 100.0
    max-engagement-boost: 1.0
    candidate-limit: 200
    anonymous-hot-limit: 50
    interest-limit: 20
    cf-limit: 10
    hot-limit: 20

# 9. 定时任务配置
trend:
  schedule:
    view-log-retention-days: 90

# 10. 上传安全控制配置
campus:
  async:
    core-pool-size: 4      # 4核CPU，核心线程=CPU核数
    max-pool-size: 8       # 最大8个，避免上下文切换开销
    queue-capacity: 500    # 队列适当加大，缓冲突发请求
    keep-alive-seconds: 60
    await-termination-seconds: 60
    thread-name-prefix: "campus-async-"
  cache:
    null-value-ttl-seconds: 30
    version-key-ttl-hours: 168
    ttl-jitter-ratio: 0.2
  upload:
    url-prefix: "/uploads/"
    avatar-module: "avatar"
    max-image-size-mb: ${MAX_IMAGE_SIZE_MB:15}
    max-image-width: ${MAX_IMAGE_WIDTH:1920}
    max-image-height: ${MAX_IMAGE_HEIGHT:1080}
    jpeg-quality: ${IMAGE_JPEG_QUALITY:0.85}
    allowed-image-extensions: ".jpg,.jpeg,.png,.gif,.webp"
    max-video-size-mb: ${MAX_VIDEO_SIZE_MB:512}
    allowed-video-extensions: ".mp4,.webm,.ogg,.mov"
    video-transcode-enabled: ${VIDEO_TRANSCODE_ENABLED:false}
    ffmpeg-bin: ${FFMPEG_BIN:ffmpeg}
    video-transcode-crf: ${VIDEO_TRANSCODE_CRF:28}
    enable-malware-placeholder-scan: ${UPLOAD_ENABLE_MALWARE_SCAN:true}
    imagebed-url: ${IMAGEBED_URL:}
    imagebed-api-key: ${IMAGEBED_API_KEY:}
    imagebed-threshold-mb: ${IMAGEBED_THRESHOLD_MB:3}
  security:
    # 生产环境请替换为前端域名
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,https://allinsong.top,https://www.allinsong.top}
    # 开发环境默认关闭，生产环境请在 application-prod.yml 或 .env 中显式配置
    request-signature-required: ${REQUEST_SIGNATURE_REQUIRED:false}
  notification:
    dedupe-window-seconds: ${NOTIFICATION_DEDUPE_WINDOW_SECONDS:120}
  invite:
    required: ${INVITE_REQUIRED:false}
    user-min-level: ${INVITE_USER_MIN_LEVEL:5}
  site:
    url: ${SITE_URL:https://allinsong.top}
  support:
    admin-username: ${SUPPORT_ADMIN_USERNAME:admin}
    admin-display-name: ${SUPPORT_ADMIN_DISPLAY_NAME:社区管理员}
  observability:
    request-log-enabled: ${REQUEST_LOG_ENABLED:true}
    slow-request-ms: ${SLOW_REQUEST_MS:1000}
    slow-sql-ms: ${SLOW_SQL_MS:300}
    request-log-exclude-prefixes: ${REQUEST_LOG_EXCLUDE_PREFIXES:/actuator,/static,/uploads}
  r2:
    # Cloudflare R2（S3 协议）。浏览器直传，Java 只签 URL，不经过 Tunnel。
    enabled: ${R2_ENABLED:true}
    endpoint: ${R2_ENDPOINT:}
    region: ${R2_REGION:auto}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:campus-pulse-media}
    public-base-url: ${R2_PUBLIC_BASE_URL:https://media.allinsong.top}
    presign-ttl-seconds: ${R2_PRESIGN_TTL:3600}
    single-put-threshold-mb: ${R2_SINGLE_PUT_THRESHOLD_MB:10}
    part-size-mb: ${R2_PART_SIZE_MB:8}
    max-image-size-mb: ${R2_MAX_IMAGE_MB:15}
    max-video-size-mb: ${R2_MAX_VIDEO_MB:1024}
    allowed-image-extensions: ${R2_ALLOWED_IMAGE_EXTENSIONS:.jpg,.jpeg,.png,.gif,.webp}
    allowed-video-extensions: ${R2_ALLOWED_VIDEO_EXTENSIONS:.mp4,.webm,.ogg,.mov}
    cache-control: ${R2_CACHE_CONTROL:}
  log-management:
    enabled: ${LOG_MANAGEMENT_ENABLED:true}
    base-dir: ${LOG_BASE_DIR:./log}
    backup-dir: ${LOG_BACKUP_DIR:./log/backups}
    list-limit: ${LOG_LIST_LIMIT:200}
    preview-max-lines: ${LOG_PREVIEW_MAX_LINES:400}
    preview-max-bytes: ${LOG_PREVIEW_MAX_BYTES:131072}
    default-preview-lines: ${LOG_DEFAULT_PREVIEW_LINES:200}
    backup-retention-days: ${LOG_BACKUP_RETENTION_DAYS:15}
    max-backup-files: ${LOG_MAX_BACKUP_FILES:30}
    max-backup-total-size-mb: ${LOG_MAX_BACKUP_TOTAL_SIZE_MB:1024}
    auto-backup-enabled: ${LOG_AUTO_BACKUP_ENABLED:false}
    auto-backup-cron: ${LOG_AUTO_BACKUP_CRON:0 0 */6 * * ?}
    cleanup-cron: ${LOG_CLEANUP_CRON:0 20 4 * * ?}
    allowed-extensions: ${LOG_ALLOWED_EXTENSIONS:.log,.txt,.out,.err,.gz}

# 11. 第三方登录与二步验证配置
oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:https://allinsong.top/auth?type=login&provider=github}

cloudflare:
  turnstile:
    enabled: ${TURNSTILE_ENABLED:true}
    allow-local-preview-skip: ${TURNSTILE_ALLOW_LOCAL_PREVIEW_SKIP:true}
    # site-key 为前端公开值，可保留；secret-key 为敏感密钥，禁止提交，必须通过环境变量 TURNSTILE_SECRET_KEY 注入。
    site-key: ${TURNSTILE_SITE_KEY:0x4AAAAAAC9xtOXBNKG-KQE9}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
    connect-timeout-seconds: ${TURNSTILE_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${TURNSTILE_READ_TIMEOUT_SECONDS:8}
    proxy-host: ${TURNSTILE_PROXY_HOST:}
    proxy-port: ${TURNSTILE_PROXY_PORT:}

security:
  two-factor:
    issuer: ${TWO_FACTOR_ISSUER:Zens社区}
    login-ticket-expire-seconds: ${TWO_FACTOR_LOGIN_TICKET_EXPIRE_SECONDS:300}
    setup-expire-seconds: ${TWO_FACTOR_SETUP_EXPIRE_SECONDS:600}

auth:
  session:
    single-device: ${AUTH_SESSION_SINGLE_DEVICE:false}
    anomaly-notify-cooldown-seconds: ${AUTH_SESSION_ANOMALY_NOTIFY_COOLDOWN_SECONDS:3600}
