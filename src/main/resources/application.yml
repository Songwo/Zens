server:
  port: 7800
  forward-headers-strategy: framework
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types:
      - application/json
      - application/xml
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - image/svg+xml
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: 120000
    keep-alive-timeout: 120000
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    max-swallow-size: -1
spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  # 设置自定义 Banner 文件位置
  banner:
    location: classpath:banner.txt
  output:
    ansi:
      enabled: ALWAYS

  # 2. 数据库配置 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_pulse?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      minimum-idle: ${DB_MIN_IDLE:8}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:32}
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      validation-timeout: 5000
      keepalive-time: 60000
      leak-detection-threshold: 120000
      connection-test-query: SELECT 1
      pool-name: CampusPulseHikariCP
      register-mbeans: true

  # 2.1 Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        shutdown-timeout: 100ms
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: 3000ms

  # 2.2 邮件服务配置
  # 使用 QQ 邮箱示例，其他邮箱请修改 host 和 port
  # 163邮箱: smtp.163.com:465 或 smtp.163.com:25
  # Gmail: smtp.gmail.com:587
  mail:
    host: ${MAIL_HOST:smtp.163.com}         # SMTP 服务器地址
    port: ${MAIL_PORT:465}                  # 端口 (587=TLS, 465=SSL)
    username: ${MAIL_USERNAME:zhaoqsnyah@163.com}   # 发件人邮箱
    password: ${MAIL_PASSWORD:}      # 授权码（生产环境必须通过环境变量注入）
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true      # 如果使用465端口，改为true
          timeout: 5000
  mvc:
    async:
      request-timeout: 10m

  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 520MB
      file-size-threshold: 2MB

# 3.MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-statement-timeout: 30
    default-fetch-size: 100
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: campus-pulse
    enable:
      hikaricp: true

# 4.Logging 配置
logging:
  # 1. 日志文件配置
  # 定义日志文件的完整路径和名称。
  # 文件将输出到项目根目录下的 /log/ 文件夹中。
  file:
    name: ./log/logfile.log
  # 2. 日志级别和输出格式
  # 设置日志输出格式
  pattern:
    # 控制台日志格式：时间 | 线程 | 级别 | Logger名称 | 消息
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){green} %clr(%logger){cyan} %clr(-){faint} %msg%n"
    # 文件日志格式：与控制台保持一致
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

  # 设置日志级别 (从低到高：TRACE, DEBUG, INFO, WARN, ERROR)
  level:
    # 根级别日志：对所有未单独配置的包生效
    root: INFO

    # 业务代码日志：将业务包设置为 DEBUG，以便看到 @Slf4j 打印的 DEBUG 级别信息
    com.campus.trend.campus_pulse: ${APP_LOG_LEVEL:INFO}

    # 第三方库日志：减少第三方库（如 Hibernate, Mybatis-Plus, Spring Security）的日志输出，避免刷屏
    com.baomidou: WARN
    org.springframework.security: WARN

# 5.JWT 配置
jwt:
  secret: ${JWT_SECRET:zf3sg4ikVorzR1S/cel4+o/VkQH+4LZxU8RkX0c0Ne6BFPf9NnPL09AoHSK9Zg95}
  access-expire: 3600000        # 1 小时
  refresh-expire: 604800000     # 7 天
  remember-access-multiplier: 7
  remember-refresh-multiplier: 4
  sliding-renew-threshold: 900000

# 6.Web Url 配置
Web:
  AvatarUrl: "https://zenslt.allinsong.top/static/avatar/"

# 7. AI 深度思考模型配置
ai:
  deepseek:
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

# 8. 推荐权重参数（可配置化）
recommendation:
  weights:
    tag-score-weight: 1.0
    time-factor-weight: 1.0
    engagement-factor-weight: 1.0
    time-decay-days: 7.0
    time-decay-exponent: 1.2
    like-weight: 1.0
    comment-weight: 2.0
    collect-weight: 1.5
    engagement-divisor: 100.0
    max-engagement-boost: 1.0
    candidate-limit: 200
    anonymous-hot-limit: 50
    interest-limit: 20
    cf-limit: 10
    hot-limit: 20

# 9. 定时任务配置
trend:
  schedule:
    view-log-retention-days: 90

# 10. 上传安全控制配置
campus:
  async:
    core-pool-size: 4      # 4核CPU，核心线程=CPU核数
    max-pool-size: 8       # 最大8个，避免上下文切换开销
    queue-capacity: 500    # 队列适当加大，缓冲突发请求
    keep-alive-seconds: 60
    await-termination-seconds: 60
    thread-name-prefix: "campus-async-"
  cache:
    null-value-ttl-seconds: 30
    version-key-ttl-hours: 168
    ttl-jitter-ratio: 0.2
  upload:
    url-prefix: "/uploads/"
    avatar-module: "avatar"
    max-image-size-mb: ${MAX_IMAGE_SIZE_MB:5}
    max-image-width: ${MAX_IMAGE_WIDTH:1920}
    max-image-height: ${MAX_IMAGE_HEIGHT:1080}
    jpeg-quality: ${IMAGE_JPEG_QUALITY:0.85}
    allowed-image-extensions: ".jpg,.jpeg,.png,.gif,.webp"
    max-video-size-mb: ${MAX_VIDEO_SIZE_MB:80}
    allowed-video-extensions: ".mp4,.webm,.ogg,.mov"
    video-transcode-enabled: ${VIDEO_TRANSCODE_ENABLED:false}
    ffmpeg-bin: ${FFMPEG_BIN:ffmpeg}
    video-transcode-crf: ${VIDEO_TRANSCODE_CRF:28}
    enable-malware-placeholder-scan: ${UPLOAD_ENABLE_MALWARE_SCAN:true}
    imagebed-url: ${IMAGEBED_URL:}
    imagebed-api-key: ${IMAGEBED_API_KEY:}
    imagebed-threshold-mb: ${IMAGEBED_THRESHOLD_MB:3}
  security:
    # 生产环境请替换为前端域名
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,https://zenslt.allinsong.top}
    # 开发期可关闭强制签名，生产建议开启 true
    request-signature-required: ${REQUEST_SIGNATURE_REQUIRED:true}
  notification:
    dedupe-window-seconds: ${NOTIFICATION_DEDUPE_WINDOW_SECONDS:120}
  invite:
    required: ${INVITE_REQUIRED:false}
    user-min-level: ${INVITE_USER_MIN_LEVEL:5}
  site:
    url: ${SITE_URL:https://zenslt.allinsong.top}
  support:
    admin-username: ${SUPPORT_ADMIN_USERNAME:admin}
    admin-display-name: ${SUPPORT_ADMIN_DISPLAY_NAME:社区管理员}
  observability:
    request-log-enabled: ${REQUEST_LOG_ENABLED:true}
    slow-request-ms: ${SLOW_REQUEST_MS:1000}
    slow-sql-ms: ${SLOW_SQL_MS:300}
    request-log-exclude-prefixes: ${REQUEST_LOG_EXCLUDE_PREFIXES:/actuator,/static,/uploads}

