services:
  miukey:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY:-10000000-ffff-ffff-ffff-000000000001}
    image: cdk-zens-miukey:latest
    container_name: cdk-airdrop
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CDK_AIRDROP_BIND:-127.0.0.1}:${CDK_AIRDROP_PORT:-8088}:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CDK_AIRDROP_ADDR=:8088
      - CDK_AIRDROP_DATA_FILE=/app/data/state.json
      - CDK_AIRDROP_PUBLIC_DIR=/app/dist
      - CDK_POSTGRES_DSN=${CDK_POSTGRES_DSN:-postgres://cdk_airdrop:cdk_airdrop_change_me@postgres:5432/cdk_airdrop?sslmode=disable}
      - CDK_AIRDROP_REDIS_URL=${CDK_AIRDROP_REDIS_URL:-}
      - CDK_AIRDROP_RABBITMQ_URL=${CDK_AIRDROP_RABBITMQ_URL:-}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET:-}
      - HCAPTCHA_SITE_KEY=${HCAPTCHA_SITE_KEY:-}
      - HCAPTCHA_VERIFY_URL=${HCAPTCHA_VERIFY_URL:-https://api.hcaptcha.com/siteverify}
      - CDK_COMMUNITY_URL=${CDK_COMMUNITY_URL:-http://localhost:5173}
      - CDK_COMMUNITY_CLIENT_ID=${CDK_COMMUNITY_CLIENT_ID:-cdk-airdrop}
      - CDK_COMMUNITY_JWT_SECRET=${CDK_COMMUNITY_JWT_SECRET:?CDK_COMMUNITY_JWT_SECRET 必须由环境提供}
    volumes:
      - cdk_airdrop_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: cdk-airdrop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cdk_airdrop}
      - POSTGRES_USER=${POSTGRES_USER:-cdk_airdrop}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cdk_airdrop_change_me}
      - TZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles:
      - cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles:
      - cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

volumes:
  postgres_data:
  cdk_airdrop_data:
