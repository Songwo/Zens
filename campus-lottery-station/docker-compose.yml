services:
  zens-lottery:
    build:
      context: .
      dockerfile: Dockerfile
    image: zens-lottery-station:latest
    container_name: zens-lottery
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${LOTTERY_BIND:-127.0.0.1}:${LOTTERY_PORT:-8093}:8093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "www.allinsong.top:host-gateway"
    volumes:
      - zens-lottery-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8093/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  zens-lottery-data:
