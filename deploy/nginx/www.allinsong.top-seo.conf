# Include these exact locations in the www.allinsong.top server block.
# They keep SEO documents dynamic instead of serving stale files from the SPA dist directory.
location = /robots.txt {
    proxy_pass http://127.0.0.1:7800/robots.txt;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /sitemap.xml {
    proxy_pass http://127.0.0.1:7800/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /feed.xml {
    proxy_pass http://127.0.0.1:7800/feed.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /rss.xml {
    return 301 https://www.allinsong.top/feed.xml;
}
