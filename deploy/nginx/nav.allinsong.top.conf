server {
    listen 80;
    server_name nav.allinsong.top;

    root /www/wwwroot/Zens-Nav;
    index index.html;

    access_log /www/wwwlogs/nav.allinsong.top.log;
    error_log /www/wwwlogs/nav.allinsong.top.error.log;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; font-src 'self'; style-src 'self'; script-src 'self'; connect-src 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /index.html {
        expires -1;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
