# Keep the HMAC-signed path intact. The generic /api/ proxy intentionally
# strips /api for legacy controllers, but InternalServiceFilter signs and
# matches the original /api/internal/** request URI.
location ^~ /api/internal/ {
    proxy_pass http://127.0.0.1:7800;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
}
