# Include these locations in the canonical www.allinsong.top server block.
# Vite build assets are content-hashed, while index.html and the service worker
# must always revalidate so a release cannot strand clients on an old app shell.

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
}

location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
}

location = /manifest.json {
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    try_files $uri =404;
}

location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ^~ /official/ {
    # Official asset URLs carry a content revision query (for example ?v=<digest>).
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ^~ /icons/ {
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    try_files $uri =404;
}

location ~* ^/(?:logo|logo-horizontal)\.png$ {
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    try_files $uri =404;
}
