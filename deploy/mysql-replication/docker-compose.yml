services:
  mysql-source:
    image: mysql:8.4
    container_name: campus-mysql-source
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_SOURCE_ROOT_PASSWORD:?Set MYSQL_SOURCE_ROOT_PASSWORD in deploy/mysql-replication/.env}
      MYSQL_DATABASE: campus_pulse
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:?Set MYSQL_REPLICATION_USER in deploy/mysql-replication/.env}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:?Set MYSQL_REPLICATION_PASSWORD in deploy/mysql-replication/.env}
    ports:
      - "127.0.0.1:${MYSQL_SOURCE_PORT:-3307}:3306"
    volumes:
      - source-data:/var/lib/mysql
      - ./source/conf.d/my.cnf:/etc/mysql/conf.d/zz-replication.cnf:ro
      - ./source/scripts:/opt/campus-replication/source:ro
      - ./scripts:/opt/campus-replication/common:ro
      - replication-seed:/replication-seed
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping --user=root --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  mysql-replica:
    image: mysql:8.4
    container_name: campus-mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_REPLICA_ROOT_PASSWORD:?Set MYSQL_REPLICA_ROOT_PASSWORD in deploy/mysql-replication/.env}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:?Set MYSQL_REPLICATION_USER in deploy/mysql-replication/.env}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:?Set MYSQL_REPLICATION_PASSWORD in deploy/mysql-replication/.env}
    ports:
      - "127.0.0.1:${MYSQL_REPLICA_PORT:-3308}:3306"
    volumes:
      - replica-data:/var/lib/mysql
      - ./replica/conf.d/my.cnf:/etc/mysql/conf.d/zz-replication.cnf:ro
      - ./replica/scripts:/opt/campus-replication/replica:ro
      - ./scripts:/opt/campus-replication/common:ro
      - replication-seed:/replication-seed
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping --user=root --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  source-data:
  replica-data:
  replication-seed:
